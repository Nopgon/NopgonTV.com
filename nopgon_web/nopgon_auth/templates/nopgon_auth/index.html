{% extends 'base.html' %}

{% block content %}

<div class="video-grid">

{% for video in videos %}
<a href="{{ video.video_url }}" target="_blank" class="video-card">

    <img src="{{ video.thumbnail }}">

    <h4>{{ video.title }}</h4>

    <p>조회수 {{ video.views }}</p>
    <p>{{ video.date }}</p>

</a>
{% endfor %}

</div>

<style>

.video-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
}

.video-card{
    text-decoration:none;
    color:black;
    transition:0.2s;
}

.video-card img{
    width:100%;
    border-radius:10px;
}

.video-card:hover{
    transform:scale(1.05);
}

</style>

{% endblock %}

<div style="display:flex; align-items:center; gap:10px;">
  <h2>🔥 추천 영상</h2>

  <a href="?shuffle=1"
     style="
       padding:6px 12px;
       background:#222;
       color:#fff;
       border-radius:20px;
       font-size:14px;
       text-decoration:none;
     ">
    🔀 추천영상 다시보기
  </a>
</div>

<div class="video-grid">

{% for video in recommended %}
    <a href="{{ video.video_url }}" target="_blank">
        <img src="{{ video.thumbnail }}">
        <p>{{ video.title }}</p>
    </a>
{% endfor %}

</div>

<style>

.video-grid{
    display:grid;
    grid-template-columns: repeat(3,1fr);
    gap:20px;
}

.video-grid img{
    width:100%;
    border-radius:10px;
}

.video-grid a{
    text-decoration:none;
    color:white;
}

</style>

<form method="get">
  <input name="q" placeholder="검색" value="{{ query }}">
  <button>검색</button>
</form>

<h1>NOGON TV</h1>

<a href="{% url 'shop' %}">
    <button>노곤 Shop</button>
</a>
